# ============================================================
# Financial Portfolio Forecasting & Anomaly Detection
# Docker Compose Configuration
# ============================================================

version: "3.9"

services:
  financial-portfolio-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-portfolio-api
    restart: unless-stopped

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      ENVIRONMENT: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "False"

    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./reports:/app/reports
      - ./logs:/app/logs

    command: >
      uvicorn app.api:app
      --host 0.0.0.0
      --port 8000

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    networks:
      - financial-portfolio-network


  financial-portfolio-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: financial-portfolio-dashboard
    restart: unless-stopped

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      ENVIRONMENT: production
      STREAMLIT_HOST: 0.0.0.0
      STREAMLIT_PORT: 8501
      API_BASE_URL: http://financial-portfolio-api:8000

    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./outputs:/app/outputs
      - ./reports:/app/reports
      - ./logs:/app/logs

    command: >
      streamlit run dashboard/dashboard.py
      --server.address=0.0.0.0
      --server.port=8501
      --server.headless=true

    depends_on:
      financial-portfolio-api:
        condition: service_healthy

    networks:
      - financial-portfolio-network


networks:
  financial-portfolio-network:
    driver: bridge