# ============================================================
# Financial Portfolio Forecasting & Anomaly Detection
# Main Project Configuration
# ============================================================

project:
  name: financial-portfolio-forecasting-anomaly-detection
  version: 0.1.0
  author: Ayisha Mariyam
  environment: development
  random_state: 42

# ============================================================
# Dataset Configuration
# ============================================================

data:
  date_column: date
  asset_column: asset
  price_column: price

  target_column: price

  required_columns:
    - date
    - asset
    - price

  numerical_columns:
    - price

  categorical_columns:
    - asset

# ============================================================
# Data Cleaning Configuration
# ============================================================

cleaning:
  remove_duplicates: true
  handle_missing_values: true
  missing_strategy_numeric: median
  missing_strategy_categorical: mode
  convert_date_column: true
  sort_by_date: true

  outlier_handling:
    enabled: true
    method: iqr
    lower_quantile: 0.25
    upper_quantile: 0.75
    iqr_multiplier: 1.5

# ============================================================
# Feature Engineering Configuration
# ============================================================

features:
  create_daily_returns: true
  create_rolling_features: true
  create_lag_features: true
  create_time_features: true

  rolling_windows:
    - 7
    - 14
    - 30

  lag_periods:
    - 1
    - 3
    - 7

  time_features:
    - day
    - month
    - quarter
    - year
    - day_of_week
    - is_month_start
    - is_month_end

# ============================================================
# Train-Test Split Configuration
# ============================================================

split:
  test_size: 0.2
  validation_size: 0.1
  shuffle: false
  split_method: time_based

# ============================================================
# Forecasting Model Configuration
# ============================================================

forecasting:
  enabled: true
  target_column: portfolio_value
  forecast_horizon_days: 30

  models:
    linear_regression:
      enabled: true

    random_forest:
      enabled: true
      n_estimators: 200
      max_depth: 10
      min_samples_split: 2
      min_samples_leaf: 1

    gradient_boosting:
      enabled: true
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 5

  evaluation_metrics:
    - mae
    - mse
    - rmse
    - mape
    - r2_score

  best_model_metric: rmse
  lower_is_better: true

# ============================================================
# Time Series Configuration
# ============================================================

time_series:
  frequency: D
  resample_method: mean
  seasonal_period: 30
  moving_average_window: 7

  stationarity_test:
    enabled: true
    method: adfuller

# ============================================================
# Anomaly Detection Configuration
# ============================================================

anomaly_detection:
  enabled: true

  methods:
    isolation_forest:
      enabled: true
      contamination: 0.05
      n_estimators: 200
      max_samples: auto
      random_state: 42

    z_score:
      enabled: true
      threshold: 3.0

    iqr:
      enabled: true
      multiplier: 1.5

  anomaly_features:
    - price

  output_columns:
    - date
    - asset
    - price
    - anomaly_score
    - is_anomaly
    - anomaly_method

# ============================================================
# Model Saving Configuration
# ============================================================

model:
  save_model: true
  forecasting_model_name: forecasting_model.pkl
  anomaly_model_name: anomaly_detection_model.pkl
  scaler_name: scaler.pkl
  feature_columns_name: feature_columns.json
  model_format: pickle

# ============================================================
# API Configuration
# ============================================================

api:
  host: 0.0.0.0
  port: 8000
  reload: true
  title: Financial Portfolio Forecasting API
  description: API for portfolio value forecasting and anomaly detection.
  version: 0.1.0

  endpoints:
    health: /health
    predict: /predict
    forecast: /forecast
    anomalies: /anomalies

# ============================================================
# Dashboard Configuration
# ============================================================

dashboard:
  host: 0.0.0.0
  port: 8501
  title: Financial Portfolio Forecasting & Anomaly Detection Dashboard
  page_icon: 📈
  layout: wide

  charts:
    show_portfolio_trend: true
    show_asset_allocation: true
    show_daily_returns: true
    show_forecast_chart: true
    show_anomaly_chart: true

# ============================================================
# Reporting Configuration
# ============================================================

reports:
  generate_model_report: true
  generate_anomaly_report: true
  generate_forecast_report: true
  export_format: csv

# ============================================================
# MLflow Optional Configuration
# ============================================================

mlflow:
  enabled: false
  tracking_uri: mlruns
  experiment_name: financial_portfolio_forecasting